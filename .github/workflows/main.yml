name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres_user
          POSTGRES_PASSWORD: jjpassword
          POSTGRES_DB: jj
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (Alembic)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres_user:jjpassword@localhost:5432/jj
        run: alembic -c backend/alembic.ini upgrade head

      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres_user:jjpassword@localhost:5432/jj
          SECRET_KEY: test_secret_key
        run: pytest